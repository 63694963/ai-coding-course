name: Deploy course to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble static site
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/AI-Coding-Course
          cp -R AI-Coding-Course/. _site/AI-Coding-Course/
          cp "7月15日 (1).mp3" _site/
          cp ./*.mp4 _site/
          cat > _site/index.html <<'EOF'
          <!doctype html>
          <html lang="zh-CN">
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=AI-Coding-Course/interactive-lecture.html">
              <title>Vibe coding 交互讲解</title>
            </head>
            <body>
              <a href="AI-Coding-Course/interactive-lecture.html">进入交互讲解</a>
            </body>
          </html>
          EOF
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
